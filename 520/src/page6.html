<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>怡怡</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:Georgia,"Noto Serif SC",serif;
            background: url('yi_bg.jpg') center center / cover no-repeat;
            background-attachment: fixed;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:40px 20px;
        }

        .box {
            max-width:800px;
            padding:60px 40px;
        }

        .poem {
            font-size:24px;
            line-height:2.5;
            margin-bottom:60px;
            letter-spacing:2px;
            color: #7a4a5f;
        }

        .btn {
            padding:16px 50px;
            background: #b86b8c;
            color:white;
            font-size:18px;
            border-radius:50px;
            text-decoration:none;
            font-weight:bold;
            transition:0.3s;
            margin:10px;
            display:inline-block;
            font-family: "Microsoft YaHei", sans-serif;
            box-shadow: 0 0 15px rgba(184, 107, 140, 0.25);
        }

        .btn:hover {
            background: #a05778;
            transform:scale(1.05);
        }

        .back {
            background:transparent;
            color:#b86b8c;
            border:2px solid #b86b8c;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="poem">
        你偶然闯入了我并不引以为傲的生活，<br>
        从那天起，我的生活开始发生变化。<br>
        我的呼吸变得顺畅了，<br>
        我讨厌的东西减少了，<br>
        我可以自由地欣赏值得欣赏的东西了。
    </div>
    <a href="page7.html" class="btn">点一下乐怡平平安安！</a>
    <br>

</div>
</body>
</html>
