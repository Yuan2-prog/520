<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>怡怡大人 | 心愿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Georgia", "Noto Serif SC", serif;
      background: url('bg2.jpg') center center / cover no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
      position: relative;
      overflow: hidden;
    }

    /* 飘落爱心画布 */
    #hearts {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    body::after{
      content: '';
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(255,255,255,0.65);
      z-index: -1;
    }

    .box {
      max-width: 800px;
      padding: 60px 40px;
      position: relative;
      z-index: 1;
      animation: breathe 3s infinite ease-in-out;
    }

    /* 呼吸渐变动画 */
    @keyframes breathe {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }

    h1 {
      font-size: 42px;
      color: #b86b8c;
      margin-bottom: 50px;
      letter-spacing: 5px;
      font-weight: normal;
      text-shadow: 0 0 10px rgba(184,107,140,0.2);
    }

    .poem {
      font-size: 24px;
      line-height: 2.5;
      color: #724b60;
      margin-bottom: 60px;
      text-align: left;
      letter-spacing: 2px;
    }

    .btn {
      display: inline-block;
      padding: 16px 50px;
      background: #b86b8c;
      color: white;
      font-size: 18px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: bold;
      box-shadow: 0 0 20px rgba(184, 107, 140, 0.3);
      transition: all 0.3s ease;
      font-family: "Microsoft YaHei", sans-serif;
      margin: 10px;
    }

    .btn:hover {
      background: #a05778;
      transform: scale(1.05);
    }
  </style>
</head>

<body>
<canvas id="hearts"></canvas>

<div class="box">
  <h1>怡怡宝</h1>

  <div class="poem">
    我讨厌距离、阴影、痛苦、下雨。<br>
    我想要明亮的日子，<br>
    和你一起，靠着大海和沙滩，<br>
    我想要奇幻的天空，我想要的国度，<br>
    但是要和你在一起，和你在一起。
  </div>

  <a href="page3.html" class="btn">点一下乐怡变猪！</a>
  <br>
  <a href="index.html" class="btn">再看一遍前面！</a>
</div>

<script>
  // 温柔小爱心飘落特效
  const canvas = document.getElementById('hearts');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let hearts = [];

  function random(min, max) {
    return Math.random() * (max - min) + min;
  }

  function createHeart() {
    return {
      x: random(0, canvas.width),
      y: random(-100, -50),
      size: random(6, 18),
      speed: random(1, 3),
      opacity: random(0.3, 0.7),
      color: '#b86b8c',
      sway: random(-0.5, 0.5)
    };
  }

  function drawHeart(heart) {
    ctx.save();
    ctx.globalAlpha = heart.opacity;
    ctx.fillStyle = heart.color;
    ctx.beginPath();
    ctx.moveTo(heart.x, heart.y);
    ctx.bezierCurveTo(
            heart.x - heart.size/2, heart.y - heart.size/2,
            heart.x - heart.size, heart.y + heart.size/3,
            heart.x, heart.y + heart.size
    );
    ctx.bezierCurveTo(
            heart.x + heart.size, heart.y + heart.size/3,
            heart.x + heart.size/2, heart.y - heart.size/2,
            heart.x, heart.y
    );
    ctx.fill();
    ctx.restore();
  }

  function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (hearts.length < 30) {
      hearts.push(createHeart());
    }

    for (let i = hearts.length - 1; i >= 0; i--) {
      let h = hearts[i];
      h.y += h.speed;
      h.x += h.sway;
      drawHeart(h);

      if (h.y > canvas.height) {
        hearts.splice(i, 1);
      }
    }
    requestAnimationFrame(update);
  }

  update();

  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
</script>
</body>
</html>
