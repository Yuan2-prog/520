<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>怡怡</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:Georgia,"Noto Serif SC",serif;
      background: url('love_bg.jpg') center center / contain no-repeat;
      background-color: #f8eeee;
      background-attachment: fixed;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:40px 20px;
      position: relative;
      overflow: hidden;
    }
    /* 爱心画布 */
    #heartCanvas{
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .box {
      max-width:800px;
      padding:60px 40px;
      position: relative;
      z-index: 1;
    }
    .poem {
      font-size:24px;
      line-height:2.5;
      margin-bottom:60px;
      letter-spacing:2px;
      color: #000000;
    }
    .btn {
      padding:16px 50px;
      background: #b86b8c;
      color:white;
      font-size:18px;
      border-radius:50px;
      text-decoration:none;
      font-weight:bold;
      transition:0.3s;
      margin:10px;
      display:inline-block;
      font-family: "Microsoft YaHei", sans-serif;
      box-shadow: 0 0 15px rgba(184, 107, 140, 0.25);
    }
    .btn:hover {
      background: #a05778;
      transform:scale(1.05);
    }
  </style>
</head>
<body>
<canvas id="heartCanvas"></canvas>
<div class="box">
  <div class="poem">
    亲爱的张乐怡<br>
    除非别无选择，否则不要退缩。<br>
    好好生活，保持好奇，继续光彩夺目，<br>
    寻找生活中的美，阅读你喜欢的书，<br>
    休息的时候想一想一直在思念你的我。<br>
    我爱你。
  </div>
  <a href="index.html" class="btn">我们一直初见</a>
</div>

<script>
  const canvas = document.getElementById('heartCanvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let hearts = [];
  const heartColor = "#b86b8c";

  function Heart(){
    this.x = Math.random() * canvas.width;
    this.y = canvas.height;
    this.size = Math.random() * 8 + 6;
    this.speed = Math.random() * 1.5 + 1;
    this.alpha = 1;
    this.wave = Math.random() * 2 - 1;
  }

  Heart.prototype.draw = function(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = heartColor;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.bezierCurveTo(this.x-this.size, this.y-this.size/2, this.x-this.size, this.y-this.size, this.x, this.y-this.size*1.2);
    ctx.bezierCurveTo(this.x+this.size, this.y-this.size, this.x+this.size, this.y-this.size/2, this.x, this.y);
    ctx.fill();
    ctx.restore();
  };

  Heart.prototype.update = function(){
    this.y -= this.speed;
    this.x += this.wave * 0.8;
    this.alpha -= 0.006;
  };

  function createHeart(){
    hearts.push(new Heart());
  }

  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 持续生成粉色小爱心向上弹出
    if(Math.random() > 0.85) createHeart();
    for(let i = hearts.length - 1; i >= 0; i--){
      hearts[i].update();
      hearts[i].draw();
      if(hearts[i].alpha <= 0){
        hearts.splice(i,1);
      }
    }
    requestAnimationFrame(animate);
  }
  animate();

  window.onresize = ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
</script>
</body>
</html>
